name: Sync TikZ Editor Embed with Host

on:
  workflow_dispatch:
    inputs:
      tikz_editor_ref:
        description: Upstream DominikPeters/tikz-editor ref to build
        required: false
        default: master
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: tikz-editor-embed-sync
  cancel-in-progress: true

env:
  TIKZ_EDITOR_REF: ${{ github.event.inputs.tikz_editor_ref || 'master' }}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mirror repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install mirror dependencies
        run: npm install

      - name: Build embed from upstream
        run: npm run build

      - name: Sync generated folders to repository root
        run: |
          rm -rf tikz-editor host
          cp -R dist/site/tikz-editor ./tikz-editor
          cp -R dist/site/host ./host
          cp dist/site/README.txt ./tikz-editor/README.txt
          cp dist/site/.nojekyll ./.nojekyll

      - name: Verify
        run: |
          test -f "tikz-editor/index.html" || (echo "MISSING: tikz-editor/index.html" && exit 1)
          test -f "host/index.html" || (echo "MISSING: host/index.html" && exit 1)
          test -f ".nojekyll" || (echo "MISSING: .nojekyll" && exit 1)
          echo "✓ tikz-editor ready ($(find tikz-editor -type f | wc -l) files)"
          echo "✓ host ready ($(find host -type f | wc -l) files)"

      - name: Commit generated embed folders
        if: github.ref_type != 'tag'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tikz-editor/ host/ .nojekyll
          git diff --staged --quiet || git commit -m "Update TikZ editor embed $(date +%Y-%m-%d)"
          git push || true

      - name: Create release zip
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then VERSION="preview-${GITHUB_SHA::7}"; fi
          cd dist/site
          zip -r "../tikz-editor-embed-${VERSION}.zip" tikz-editor host README.txt .nojekyll
          echo "ZIP_PATH=dist/tikz-editor-embed-${VERSION}.zip" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tikz-editor-embed
          path: |
            dist/site
            ${{ env.ZIP_PATH }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish GitHub release for tags
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "$ZIP_PATH" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes "Static TikZ editor embed asset for TeXlyre. Built from DominikPeters/tikz-editor ref: ${TIKZ_EDITOR_REF}."
